services:
  backend:
    build:
      context: ./backend
    environment:
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://api.openai.com/v1}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4.1-mini}
      - DEEPFACE_URL=${DEEPFACE_URL:-http://deepface:8001}
      - SENSEVOICE_URL=${SENSEVOICE_URL:-http://sensevoice:8002}
      - DATABASE_URL=${DATABASE_URL:-postgresql+asyncpg://emotion:emotion@postgres:5432/emotion}
      - AUTH_SECRET_KEY=${AUTH_SECRET_KEY:-dev-only-change-this-secret-key-please}
      - BACKEND_CORS_ORIGINS=${BACKEND_CORS_ORIGINS:-http://localhost:5173}
    ports:
      - "8000:8000"
    volumes:
      - ./storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
      deepface:
        condition: service_started
      sensevoice:
        condition: service_started

  frontend:
    build:
      context: ./frontend
    environment:
      - VITE_API_BASE_URL=http://localhost:8000
    ports:
      - "5173:5173"
    depends_on:
      backend:
        condition: service_started

  deepface:
    build:
      context: ./model-services/deepface
    ports:
      - "8001:8001"
    volumes:
      - ./storage:/app/storage
      - deepface-cache:/root/.deepface

  sensevoice:
    build:
      context: ./model-services/sensevoice
    ports:
      - "8002:8002"
    volumes:
      - ./storage:/app/storage
      - sensevoice-cache:/root/.cache/modelscope

  postgres:
    image: docker.1ms.run/library/postgres:16-alpine
    environment:
      - POSTGRES_DB=emotion
      - POSTGRES_USER=emotion
      - POSTGRES_PASSWORD=emotion
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U emotion -d emotion"]
      interval: 5s
      timeout: 5s
      retries: 12

volumes:
  deepface-cache:
  sensevoice-cache:
  postgres-data:
